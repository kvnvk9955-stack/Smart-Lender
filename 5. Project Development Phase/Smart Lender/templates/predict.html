{% extends 'layout.html' %}

{% block content %}
<div class="glass-card" style="max-width: 700px; margin: 0 auto;">
    <h2 class="section-title"><i class="fa-solid fa-file-invoice-dollar"></i> Loan Eligibility Predictor</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Please fill out the multi-step form below to check loan status eligibility. All fields are parsed and standardized.</p>

    <!-- Form Steps Indicator -->
    <div class="step-indicator">
        <div class="step active" id="step-indicator-1">1</div>
        <div class="step" id="step-indicator-2">2</div>
        <div class="step" id="step-indicator-3">3</div>
    </div>

    <!-- Multi-step Form -->
    <form action="{{ url_for('predict') }}" method="POST" id="loanForm">

        <!-- STEP 1: Profile Info -->
        <div class="form-step active" id="step-1">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; font-family: 'Outfit';">Step 1: User Profile</h3>

            <div class="form-group">
                <label for="user_name">Full Name <span style="color: var(--error);">*</span></label>
                <input type="text" id="user_name" name="user_name" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="user_email">Email Address <span style="color: var(--error);">*</span></label>
                <input type="email" id="user_email" name="user_email" placeholder="e.g. john.doe@bank.com" required>
            </div>

            <div class="form-group">
                <label for="user_role">User Role <span style="color: var(--error);">*</span></label>
                <select id="user_role" name="user_role" required>
                    <option value="Credit Officer">Credit Officer</option>
                    <option value="Financial Analyst">Financial Analyst</option>
                    <option value="Applicant">Applicant / Customer</option>
                </select>
            </div>
        </div>

        <!-- STEP 2: Applicant Background -->
        <div class="form-step" id="step-2">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; font-family: 'Outfit';">Step 2: Personal Background</h3>

            <div class="form-group">
                <label for="gender">Gender <span style="color: var(--error);">*</span></label>
                <select id="gender" name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="married">Marital Status <span style="color: var(--error);">*</span></label>
                <select id="married" name="married" required>
                    <option value="Yes">Married</option>
                    <option value="No">Single / Unmarried</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dependents">Number of Dependents <span style="color: var(--error);">*</span></label>
                <select id="dependents" name="dependents" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3+">3 or more</option>
                </select>
            </div>

            <div class="form-group">
                <label for="education">Education <span style="color: var(--error);">*</span></label>
                <select id="education" name="education" required>
                    <option value="Graduate">Graduate</option>
                    <option value="Not Graduate">Not Graduate</option>
                </select>
            </div>

            <div class="form-group">
                <label for="self_employed">Self Employed <span style="color: var(--error);">*</span></label>
                <select id="self_employed" name="self_employed" required>
                    <option value="Yes">Yes, Self Employed</option>
                    <option value="No">No, Salaried Employee</option>
                </select>
            </div>
        </div>

        <!-- STEP 3: Financial Details -->
        <div class="form-step" id="step-3">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; font-family: 'Outfit';">Step 3: Financial Details</h3>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="applicant_income">Applicant Income ($ / Mo) <span style="color: var(--error);">*</span></label>
                    <input type="number" id="applicant_income" name="applicant_income" min="0" placeholder="e.g. 5000" required>
                </div>
                <div class="form-group">
                    <label for="coapplicant_income">Co-Applicant Income ($ / Mo)</label>
                    <input type="number" id="coapplicant_income" name="coapplicant_income" min="0" value="0" placeholder="e.g. 1500">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="loan_amount">Loan Amount (in Thousands, e.g. 120 = $120,000) <span style="color: var(--error);">*</span></label>
                    <input type="number" id="loan_amount" name="loan_amount" min="1" placeholder="e.g. 150" required>
                </div>
                <div class="form-group">
                    <label for="loan_term">Loan Term (in Days, e.g. 360 = 1 Year) <span style="color: var(--error);">*</span></label>
                    <select id="loan_term" name="loan_term" required>
                        <option value="360">360 (Regular)</option>
                        <option value="180">180 (Short term)</option>
                        <option value="240">240 (Medium term)</option>
                        <option value="120">120 (Express)</option>
                        <option value="480">480 (Extended)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="credit_history">Credit History <span style="color: var(--error);">*</span></label>
                <select id="credit_history" name="credit_history" required>
                    <option value="1.0">Good (All past repayments met)</option>
                    <option value="0.0">Poor / Default (Late payments or defaults)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="property_area">Property Area Location <span style="color: var(--error);">*</span></label>
                <select id="property_area" name="property_area" required>
                    <option value="Urban">Urban Area</option>
                    <option value="Semiurban">Semi-Urban Area</option>
                    <option value="Rural">Rural Area</option>
                </select>
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="form-navigation">
            <button type="button" class="btn-secondary" id="btn-back" style="visibility: hidden;"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <button type="button" class="btn-primary" id="btn-next">Next <i class="fa-solid fa-arrow-right"></i></button>
            <button type="submit" class="btn-primary" id="btn-submit" style="display: none;"><i class="fa-solid fa-check-double"></i> Submit &amp; Analyze</button>
        </div>
    </form>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;

    const btnBack = document.getElementById('btn-back');
    const btnNext = document.getElementById('btn-next');
    const btnSubmit = document.getElementById('btn-submit');
    const form = document.getElementById('loanForm');

    btnNext.addEventListener('click', () => {
        if (validateStep(currentStep)) {
            currentStep++;
            updateFormStep();
        }
    });

    btnBack.addEventListener('click', () => {
        currentStep--;
        updateFormStep();
    });

    function validateStep(step) {
        const stepContainer = document.getElementById(`step-${step}`);
        const requiredInputs = stepContainer.querySelectorAll('[required]');
        let isValid = true;

        requiredInputs.forEach(input => {
            if (!input.checkValidity()) {
                input.reportValidity();
                isValid = false;
            }
        });

        return isValid;
    }

    function updateFormStep() {
        // Toggle steps visibility
        for (let i = 1; i <= totalSteps; i++) {
            const stepDiv = document.getElementById(`step-${i}`);
            const indicator = document.getElementById(`step-indicator-${i}`);

            if (i === currentStep) {
                stepDiv.classList.add('active');
                indicator.classList.add('active');
            } else {
                stepDiv.classList.remove('active');
                indicator.classList.remove('active');
                if (i < currentStep) {
                    indicator.classList.add('completed');
                    indicator.innerHTML = '<i class="fa-solid fa-check"></i>';
                } else {
                    indicator.classList.remove('completed');
                    indicator.innerHTML = i;
                }
            }
        }

        // Toggle back button visibility
        if (currentStep === 1) {
            btnBack.style.visibility = 'hidden';
        } else {
            btnBack.style.visibility = 'visible';
        }

        // Toggle next/submit buttons
        if (currentStep === totalSteps) {
            btnNext.style.display = 'none';
            btnSubmit.style.display = 'inline-flex';
        } else {
            btnNext.style.display = 'inline-flex';
            btnSubmit.style.display = 'none';
        }
    }
</script>
{% endblock %}
